<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FastMart Application</title>
    
    <link rel="stylesheet" href="style.css">
    
    <link rel="shortcut icon" href="./asserts/logo.png">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.7.2/css/all.min.css" integrity="sha512-Evv84Mr4kqVGRNSgIGL/F/aIDqQb7xQ2vcrdIwxfjThSH8CSR7PBEakCr51Ck+w+/U6swU2Im1vVX0SVk9ABhg==" crossorigin="anonymous" referrerpolicy="no-referrer" />
    <body>
    <nav>
    
        <section id="nav1">
            <aside id="logo-sidebar">
                <div id="logo">Z</div>
                <div id="address">
                    <p>Delivery in <span>10 mins</span></p>
                    <p id="location" ><i class="fa-solid fa-location-dot"></i></p>
                </div>
                
            </aside>
            <aside id="links">
                <a href="#">Home</a>
                <a href="#">Products</a>
            </aside>
            <aside id="user-cart">
                <i class="fa-regular fa-user"></i>
                <i class="fa-solid fa-cart-shopping"></i>
            </aside>
        </section>

    </nav>

    <header>
        <div id="banner-container">
            <img src="./asserts/" alt="banner1">
            <img src="./asserts/" alt="banner2">
            <img src="./asserts/" alt="banner3">
        </div>
    </header>


    <!-- catagory -->
     <section id="catagory">
        <article id="catagory-title">
            <h2>Shop by Company</h2>
        </article>

     </section>

    <script src="./script.js"></script>
</body>
</html>
